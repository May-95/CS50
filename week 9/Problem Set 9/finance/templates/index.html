{% extends "layout.html" %}

{% block main %}
    <table class="table table-striped container">
        <thead>
            <tr>
                <th>Symbol</th>
                <th>Name</th>
                <th>Shares</th>
                <th>Price</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody>
            {% for share in user_info %}
            <tr>
                <td>{{share['symbol']}}</td>
                <td>{{share['name']}}</td>
                <td>{{share['shares']}}</td>
                <td>{{share['price']}}</td>
                <td>{{share['total']}}</td>
            </tr>
            {% endfor %}
        </tbody>
        <tfoot>
            <tr>
                <td class="border-0 fw-bold text-end" colspan="4">Cash</td>
                <td class="border-0 text-end">{{cash}}</td>
            </tr>
            <tr>
                <td class="border-0 fw-bold text-end" colspan="4">Total</td>
                <td class="border-0 text-end">{{user_total}}</td>
            </tr>
        </tfoot>
    </table>
{% endblock %}
